name: Daily Social Post Generator

on:
  workflow_run:
    workflows: ["Daily Article Generator"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  generate-social:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate social posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-social.cjs 2

      - name: Commit and push
        run: |
          git config user.name "Social Bot"
          git config user.email "bot@hvacsoftwarehub.com"
          git add scripts/social/
          git diff --cached --quiet || (git commit -m "Auto-generate social posts for $(date +%Y-%m-%d)" && git push origin main)
